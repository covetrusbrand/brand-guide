<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covetrus Brand Guide — Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #00707A;
      --teal-dark:  #005560;
      --teal-light: #e6f4f5;
      --ink:        #1a1a1a;
      --muted:      #6b7280;
      --border:     #d1d5db;
      --error:      #c0392b;
      --white:      #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--teal-light);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 100vh;
    }

    /* ── Background pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,112,122,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0,85,96,0.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.04),
        0 20px 60px rgba(0,112,122,0.10);
      padding: 3rem 3.5rem;
      width: 100%;
      max-width: 440px;
      animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.25rem;
    }

    /* Covetrus wordmark stand-in — replace with <img> if you have the SVG */
    .logo-mark {
      width: 40px;
      height: 40px;
      background: var(--teal);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 22px; height: 22px; fill: white; }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--teal-dark);
      letter-spacing: -0.01em;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 3rem 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,112,122,0.12);
    }

    input[type="password"].error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.10);
    }

    .toggle-pw {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--teal); }

    .error-msg {
      font-size: 0.8rem;
      color: var(--error);
      margin-top: -0.75rem;
      margin-bottom: 1rem;
      min-height: 1.1em;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .error-msg.show { opacity: 1; transform: translateY(0); }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover {
      background: var(--teal-dark);
      box-shadow: 0 4px 16px rgba(0,112,122,0.25);
    }

    button[type="submit"]:active { transform: scale(0.98); }

    button[type="submit"].loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-text { display: block; }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="logo-area">
        <div class="logo-mark">
          <!-- Simple "C" icon — swap for real logo <img> if available -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7zm1 13.9V16h-2v-.1A5.009 5.009 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5a5.009 5.009 0 0 1-4 4.9zM9 19h6v1H9z"/>
          </svg>
        </div>
        <span class="logo-text">Covetrus</span>
      </div>

      <h1>Brand Guide</h1>
      <p class="subtitle">Enter the access password to continue to the Covetrus Brand Guide.</p>

      <label for="pw">Password</label>
      <div class="input-wrap">
        <input type="password" id="pw" name="password" placeholder="••••••••••••" autocomplete="current-password" />
        <button type="button" class="toggle-pw" aria-label="Toggle password visibility" id="toggleBtn">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <p class="error-msg" id="errMsg" role="alert">Incorrect password. Please try again.</p>

      <button type="submit" id="submitBtn" onclick="handleLogin()">
        <span class="btn-text" id="btnText">Access Brand Guide</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>
  </main>

  <footer>© 2024 Covetrus. For internal use only.</footer>

  <script>
    // ─────────────────────────────────────────────
    // SHA-256 hash of the password.
    // To change the password:
    //   1. Run: echo -n "YourNewPassword" | sha256sum
    //   2. Replace the hash string below.
    // Current password: Covetrus2024!
    // ─────────────────────────────────────────────
    const CORRECT_HASH = 'ef7e9b4b9b1b3ea01f953c1ba39574bd0cd9b907bf32da03ba2c32a0b4434a8a';
    const REDIRECT_URL = './brand-guide/';   // path to your brand guide folder
    const SESSION_KEY  = 'cvt_bg_auth';

    // If already authenticated, skip login
    if (sessionStorage.getItem(SESSION_KEY) === 'granted') {
      window.location.replace(REDIRECT_URL);
    }

    // Password visibility toggle
    const pwInput  = document.getElementById('pw');
    const eyeIcon  = document.getElementById('eyeIcon');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Allow Enter key to submit
    pwInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin() {
      const btn     = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const errMsg  = document.getElementById('errMsg');
      const val     = pwInput.value;

      if (!val) return;

      // Show loading state
      btn.classList.add('loading');
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      errMsg.classList.remove('show');
      pwInput.classList.remove('error');

      // Small artificial delay so the spinner is visible
      await new Promise(r => setTimeout(r, 400));

      const hash = await sha256(val);

      if (hash === CORRECT_HASH) {
        sessionStorage.setItem(SESSION_KEY, 'granted');
        window.location.replace(REDIRECT_URL);
      } else {
        btn.classList.remove('loading');
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        pwInput.classList.add('error');
        errMsg.classList.add('show');
        pwInput.value = '';
        pwInput.focus();
      }
    }
  </script>
</body>
</html>
